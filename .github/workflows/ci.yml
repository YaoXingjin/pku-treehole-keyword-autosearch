name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile client.py meow_push.py search_keyword.py scripts/its_network_login.py

      - name: Check shell script syntax
        run: bash -n scripts/run_treehole_search.sh scripts/check_deploy_ready.sh
